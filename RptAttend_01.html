<style>
        :root {
            /* Palette Dark Report */
            --primary-color: #1e293b;   /* Slate Darker */
            --accent-color: #3b82f6;    /* Electric Blue */
            --success-color: #4ade80;   /* Light Green */
            --warning-color: #fbbf24;   /* Amber */
            --danger-color: #f87171;    /* Coral Red */
            --bg-body: #0f172a;         /* Deep Navy */
            --card-bg: #1e293b;         /* Slate Card */
            --light-bg: #334155;        /* Filter Section Bg */
            --border-color: rgba(255, 255, 255, 0.1);
            --white: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Inter', 'Segoe UI', sans-serif; 
            background-color: var(--bg-body); 
            background-image: radial-gradient(circle at top, #1e293b, #0f172a);
            color: var(--white);
            padding: 20px; 
            min-height: 100vh;
        }

        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
        }
        
        /* Filter Section - Glassmorphism style */
        .filter-section { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            background: var(--light-bg); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            align-items: flex-end; 
            border: 1px solid var(--border-color);
        }

        .form-group { display: flex; flex-direction: column; flex: 1; min-width: 180px;}
        .form-group label { font-size: 0.75rem; font-weight: 700; margin-bottom: 8px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 0.5px; }
        
        .form-group input { 
            padding: 10px; 
            background: var(--bg-body);
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            outline: none; 
            color: white;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Button - Tetap dengan Efek Bounce Kebanggaan Bos */
        .btn { 
            height: 40px; padding: 0 25px; border: none; 
            border-radius: 10px; 
            cursor: pointer; font-weight: 600; color: white; text-decoration: none;
            display: inline-flex; align-items: center; justify-content: center;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.85rem; letter-spacing: 0.5px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .btn-search { background: var(--accent-color); }
        .btn-search:hover { 
            background: #2563eb; transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4); 
        }

        .btn-back { background: #475569; }
        .btn-back:hover { 
            background: #64748b; transform: translateY(-3px); 
            box-shadow: 0 8px 20px rgba(100, 116, 139, 0.4); 
        }

        .btn:active { transform: scale(0.9); }

        /* Table Styling - Dark Carbon */
        .table-container { 
            overflow-x: auto; 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            background: #1a2233;
        }

        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        
        thead { 
            background: #0f172a; /* Lebih gelap dari body */
            color: var(--accent-color); 
        }

        th { 
            padding: 15px; 
            text-align: left; 
            border-bottom: 2px solid var(--border-color); 
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.75rem;
        }

        td { 
            padding: 14px 15px; 
            border-bottom: 1px solid var(--border-color); 
            color: var(--text-muted);
            white-space: nowrap; 
        }

        /* Hover Baris: Tulisan jadi Putih Terang & Background Slate */
        tr:hover {
            background-color: #2d3748 !important; 
            transition: all 0.2s ease;
            cursor: pointer;
        }

        tr:hover td {
            color: #ffffff !important;
            font-weight: 500;
        }
        
        /* Image & Preview Box */
        .img-wrapper { position: relative; display: inline-block; }
        .thumb { 
            width: 45px; height: 45px; object-fit: cover; 
            border-radius: 8px; border: 1px solid var(--border-color); 
        }
        
        .preview-box { 
            display: none; position: absolute; bottom: 55px; left: 50%; 
            transform: translateX(-50%); z-index: 99; 
            background: var(--card-bg); padding: 8px; 
            border-radius: 12px; box-shadow: 0 15px 30px rgba(0,0,0,0.5); 
            border: 1px solid var(--accent-color); 
        }
        .preview-box img { width: 220px; border-radius: 8px; display: block; }
        .img-wrapper:hover .preview-box { display: block; }

        /* Status & Cells */
        .status-in { color: var(--success-color); font-weight: bold; }
        .status-out { color: var(--warning-color); font-weight: bold; }
        
        .duration-cell { 
            font-weight: 800; 
            color: var(--white); 
            background: rgba(59, 130, 246, 0.1); /* Soft glow blue */
            text-align: center; 
            border-radius: 4px;
        }
    </style>
    
</head>
<body>

<div class="container">
    <header><h2>🗓️ Attendance Report</h2></header>

    <div class="filter-section">
        <div class="form-group">
            <label>🗓️ Start Date</label>
            <input type="date" id="startDate">
        </div>
        <div class="form-group">
            <label>🗓️ End Date</label>
            <input type="date" id="endDate">
        </div>
        <div class="form-group">
            <label>🆔 Employee ID</label>
            <input type="text" id="emplId" placeholder="Employee Number">
        </div>
        <div class="form-group">
            <label>🧔 Employee Name</label>
            <input type="text" id="emplNm" placeholder="Employee Name">
        </div>   
        <button class="btn btn-search" id="btnSearch" onclick="fetchAttendanceData()">🔎 Search</button>
        <a href="dashboard.html" class="btn btn-back">🏠 Dashboard</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>CODE</th>
                    <th>NAME</th>
                    <th>DATE</th>
                    <th>IN</th>
                    <th>OUT</th>
                    <th style="text-align:center;">DURATION</th> <th>AREA IN</th>
                    <th>AREA OUT</th>
                    <th>IMG IN</th>
                    <th>IMG OUT</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                <tr><td colspan="10" style="text-align:center;">⏳ Klik Search untuk memuat data...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://bzrycuvpbsxvutqhxowp.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6cnljdXZwYnN4dnV0cWh4b3dwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNTk5OTEsImV4cCI6MjA4NjkzNTk5MX0.MI2suZLflcMbc5AbPCRaT7_pT9qQISrsV5dKA63Si8s';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    window.onload = function() {
        const now = new Date();
        const firstDayObj = new Date(now.getFullYear(), now.getMonth(), 1);        
        const year = firstDayObj.getFullYear();
        const month = String(firstDayObj.getMonth() + 1).padStart(2, '0');
        const day = String(firstDayObj.getDate()).padStart(2, '0');
        document.getElementById('startDate').value = `${year}-${month}-${day}`;
        document.getElementById('endDate').value = now.toISOString().split('T')[0];
    };


async function fetchAttendanceData() {
        const btn = document.getElementById('btnSearch');
        const tbody = document.getElementById('attendanceBody');
        
        btn.innerText = "⏳ Loading...";
        btn.classList.add('btn-loading');
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">⌛ Menghitung durasi presisi (UTC Neutral)...</td></tr>';

        try {
            let query = _supabase.from('TH_ATTN01').select('*');
            const start = document.getElementById('startDate').value;
            const end = document.getElementById('endDate').value;
            const id = document.getElementById('emplId').value;
            const eNm = document.getElementById('emplNm').value;

            if (start) query = query.gte('TRAN_DATE', start);
            if (end) {
                let nextDay = new Date(end);
                nextDay.setDate(nextDay.getDate() + 1);
                query = query.lte('TRAN_DATE', nextDay.toISOString().split('T')[0]);
            }

            if (id) query = query.ilike('EMPL_NMBR', `%${id}%`);
            if (eNm) query = query.ilike('KORX_NAME', `%${eNm}%`);

            query = query.order('DATE_TIME', { ascending: true });            
            
            const { data, error } = await query;
            if (error) throw error;

            const groupedData = {};
            const activeSessions = {}; 

            data.forEach(row => {
                const status = (row.TRAN_STAT || "").trim().toLowerCase();
                const userKey = row.EMPL_NMBR;

                if (status === 'check in') {
                    const sessionKey = `${userKey}_${row.DATE_TIME}`;
                    groupedData[sessionKey] = {
                        EMPL_NMBR: row.EMPL_NMBR,
                        KORX_NAME: row.KORX_NAME,
                        IN_DATE: row.TRAN_DATE,
                        IN_TIME: row.TRAN_TIME,
                        IN_DT: row.DATE_TIME, 
                        OUT_TIME: '-',
                        OUT_DT: null,         
                        AREA_IN: row.LOCT_AREA || '-',
                        AREA_OUT: '-',
                        IMG_IN: row.IMGE_URLX || '',
                        IMG_OUT: ''
                    };
                    activeSessions[userKey] = sessionKey;
                } else if (status === 'check out') {
                    const openKey = activeSessions[userKey];
                    if (openKey && groupedData[openKey]) {
                        groupedData[openKey].OUT_TIME = row.TRAN_TIME;
                        groupedData[openKey].OUT_DT = row.DATE_TIME; 
                        groupedData[openKey].AREA_OUT = row.LOCT_AREA || '-';
                        groupedData[openKey].IMG_OUT = row.IMGE_URLX || '';
                        delete activeSessions[userKey];
                    }
                }
            });

            tbody.innerHTML = '';
            const finalRows = Object.values(groupedData)
                .filter(item => !end || item.IN_DATE <= end)
                .reverse();

            if (finalRows.length === 0) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;">Data tidak ditemukan.</td></tr>';
            } else {
                finalRows.forEach(item => {
                    let durationStr = '-';
                    
                    if (item.IN_DT && item.OUT_DT) {
                        // FIX: Paksa hitung selisih milidetik murni tanpa konversi zona waktu lokal
                        const startMs = Date.parse(item.IN_DT);
                        const endMs = Date.parse(item.OUT_DT);
                        
                        const diffMs = endMs - startMs;

                        if (diffMs > 0) {
                            const totalSeconds = Math.floor(diffMs / 1000);
                            const hrs = Math.floor(totalSeconds / 3600);
                            const mins = Math.floor((totalSeconds % 3600) / 60);
                            durationStr = `${String(hrs).padStart(2, '0')}:${String(mins).padStart(2, '0')}`;
                        } else {
                            durationStr = "00:00";
                        }
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>${item.EMPL_NMBR}</td>
                            <td>${item.KORX_NAME}</td>
                            <td>${item.IN_DATE}</td>
                            <td class="status-in">${item.IN_TIME}</td>
                            <td class="status-out">${item.OUT_TIME}</td>
                            <td class="duration-cell">${durationStr}</td>
                            <td>${item.AREA_IN}</td>
                            <td>${item.AREA_OUT}</td>
                            <td>${typeof renderImage === 'function' ? renderImage(item.IMG_IN) : '-'}</td>
                            <td>${typeof renderImage === 'function' ? renderImage(item.IMG_OUT) : '-'}</td>
                        </tr>
                    `;
                });
            }
        } catch (err) {
            alert("⛔ Error: " + err.message);
        } finally {
            btn.innerText = "🔎 Search";
            btn.classList.remove('btn-loading');
        }
    }
    
    
    function renderImage(url) {
        if (!url || url === '') return '-';
        return `<div class="img-wrapper"><img src="${url}" class="thumb"><div class="preview-box"><img src="${url}"></div></div>`;
    }
</script>
</body>
